name: "CI for cntm-graph"
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
  
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  
  mojo-build:
    name: Mojo Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Modular and Mojo
        run: |
          curl -s https://get.modular.com | sh -
          # Find where modular is
          MODULAR_PATH=$(which modular || echo "$HOME/.modular/bin/modular")
          
          if [ ! -f "$MODULAR_PATH" ] && [ "$MODULAR_PATH" != "modular" ]; then
             # Try common locations
             if [ -f "/usr/bin/modular" ]; then MODULAR_PATH="/usr/bin/modular";
             elif [ -f "/usr/local/bin/modular" ]; then MODULAR_PATH="/usr/local/bin/modular";
             fi
          fi

          echo "Using modular at: $MODULAR_PATH"
          $MODULAR_PATH auth ${{ secrets.MODULAR_AUTH_TOKEN }}
          $MODULAR_PATH install mojo
          
          # Add mojo to path
          MODULAR_HOME=$HOME/.modular
          echo "MODULAR_HOME=$MODULAR_HOME" >> $GITHUB_ENV
          MOJO_PATH=$($MODULAR_PATH config mojo.path 2>/dev/null || echo "$MODULAR_HOME/pkg/packages.modular.com_mojo/bin")
          echo "$MOJO_PATH" >> $GITHUB_PATH
      - name: Build
        run: mojo build src/main.mojo
      - name: Test
        run: mojo test src/main.mojo
