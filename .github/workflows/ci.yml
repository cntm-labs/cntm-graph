name: "CI for cntm-graph"
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
  
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  
  mojo-build:
    name: Mojo Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Modular and Mojo
        run: |
          # Noble (Ubuntu 24.04) support for Modular apt is currently pending/limited.
          # We force the Jammy (Ubuntu 22.04) repository which is confirmed to work.
          echo "Setting up Modular repository..."
          curl -1sLf 'https://dl.cloudsmith.io/public/modular/stable/gpg.6D5B4F1A.key' | sudo gpg --dearmor -o /usr/share/keyrings/modular-stable-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/modular-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/modular/stable/deb/ubuntu jammy main" | sudo tee /etc/apt/sources.list.d/modular.list
          sudo apt-get update
          sudo apt-get install -y modular
          
          echo "Authenticating Modular CLI..."
          modular auth ${{ secrets.MODULAR_AUTH_TOKEN }}
          
          echo "Installing Mojo..."
          modular install mojo
          
          # Setup paths for subsequent steps
          MODULAR_HOME=$HOME/.modular
          echo "MODULAR_HOME=$MODULAR_HOME" >> $GITHUB_ENV
          MOJO_BIN=$(modular config mojo.path 2>/dev/null || echo "$MODULAR_HOME/pkg/packages.modular.com_mojo/bin")
          echo "$MOJO_BIN" >> $GITHUB_PATH
      - name: Build
        run: mojo build src/main.mojo
      - name: Test
        run: mojo test src/main.mojo
