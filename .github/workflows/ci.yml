name: "CI for cntm-graph"
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
  
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  
  mojo-build:
    name: Mojo Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Modular and Mojo
        run: |
          curl -s https://get.modular.com | sh -
          # The modular CLI is usually in /usr/bin/modular or ~/.modular/bin/modular
          # Let's ensure it's available
          if [ -f "$HOME/.modular/bin/modular" ]; then
            echo "$HOME/.modular/bin" >> $GITHUB_PATH
            MODULAR_PATH="$HOME/.modular/bin/modular"
          else
            MODULAR_PATH="modular"
          fi
          
          $MODULAR_PATH auth ${{ secrets.MODULAR_AUTH_TOKEN }}
          $MODULAR_PATH install mojo
          
          # Add mojo to path
          MODULAR_HOME=$HOME/.modular
          echo "MODULAR_HOME=$MODULAR_HOME" >> $GITHUB_ENV
          echo "$MODULAR_HOME/pkg/packages.modular.com_mojo/bin" >> $GITHUB_PATH
      - name: Build
        run: mojo build src/main.mojo
      - name: Test
        run: mojo test src/main.mojo
