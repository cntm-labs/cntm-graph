name: "CI for cntm-graph"
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
  
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  
  mojo-build:
    name: Mojo Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Modular and Mojo
        run: |
          # The official script sometimes fails on Ubuntu 24.04 due to repo setup issues.
          # We'll try the direct debian setup.
          curl -1sLf 'https://dl.cloudsmith.io/public/modular/stable/cfg/setup/bash.deb.sh' | sudo -E bash -
          sudo apt-get update
          sudo apt-get install -y modular
          
          # Now modular should be in /usr/bin/modular
          modular auth ${{ secrets.MODULAR_AUTH_TOKEN }}
          modular install mojo
          
          # Add mojo to path
          MODULAR_HOME=$HOME/.modular
          echo "MODULAR_HOME=$MODULAR_HOME" >> $GITHUB_ENV
          MOJO_BIN=$(modular config mojo.path 2>/dev/null || echo "$MODULAR_HOME/pkg/packages.modular.com_mojo/bin")
          echo "$MOJO_BIN" >> $GITHUB_PATH
      - name: Build
        run: mojo build src/main.mojo
      - name: Test
        run: mojo test src/main.mojo
