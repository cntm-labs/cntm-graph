name: Security Audit
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit
  
  clippy-security:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install SARIF tools
        run: cargo install clippy-sarif sarif-fmt
      - name: Clippy SARIF
        run: >
          cargo clippy --all-targets --all-features --message-format=json
          | clippy-sarif
          | tee results.sarif
          | sarif-fmt
        continue-on-error: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  
  mojo-security:
    name: Mojo Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Modular and Mojo
        run: |
          curl -s https://get.modular.com | sh -
          MODULAR_PATH=$(which modular || echo "$HOME/.modular/bin/modular")
          if [ ! -f "$MODULAR_PATH" ] && [ "$MODULAR_PATH" != "modular" ]; then
             if [ -f "/usr/bin/modular" ]; then MODULAR_PATH="/usr/bin/modular";
             elif [ -f "/usr/local/bin/modular" ]; then MODULAR_PATH="/usr/local/bin/modular";
             fi
          fi
          
          $MODULAR_PATH auth ${{ secrets.MODULAR_AUTH_TOKEN }}
          $MODULAR_PATH install mojo
          
          MODULAR_HOME=$HOME/.modular
          echo "MODULAR_HOME=$MODULAR_HOME" >> $GITHUB_ENV
          MOJO_PATH=$($MODULAR_PATH config mojo.path 2>/dev/null || echo "$MODULAR_HOME/pkg/packages.modular.com_mojo/bin")
          echo "$MOJO_PATH" >> $GITHUB_PATH
      - name: Static Analysis
        run: mojo check src/main.mojo
