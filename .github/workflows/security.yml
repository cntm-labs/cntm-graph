name: Security Audit
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit
  
  clippy-security:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install SARIF tools
        run: cargo install clippy-sarif sarif-fmt
      - name: Clippy SARIF
        run: >
          cargo clippy --all-targets --all-features --message-format=json
          | clippy-sarif
          | tee results.sarif
          | sarif-fmt
        continue-on-error: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  
  mojo-security:
    name: Mojo Security Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Modular and Mojo
        run: |
          curl -s https://get.modular.com | sh -
          export PATH=$HOME/.modular/bin:$PATH
          modular auth ${{ secrets.MODULAR_AUTH_TOKEN }}
          modular install mojo
          
          echo "MODULAR_HOME=$HOME/.modular" >> $GITHUB_ENV
          echo "$HOME/.modular/bin" >> $GITHUB_PATH
          echo "$HOME/.modular/pkg/packages.modular.com_mojo/bin" >> $GITHUB_PATH
      - name: Static Analysis
        run: mojo check src/main.mojo
