name: Security Audit
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit
  
  clippy-security:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install SARIF tools
        run: cargo install clippy-sarif sarif-fmt
      - name: Clippy SARIF
        run: >
          cargo clippy --all-targets --all-features --message-format=json
          | clippy-sarif
          | tee results.sarif
          | sarif-fmt
        continue-on-error: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  
  mojo-security:
    name: Mojo Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Modular and Mojo
        run: |
          echo "Setting up Modular repository..."
          curl -1sLf 'https://dl.cloudsmith.io/public/modular/stable/gpg.6D5B4F1A.key' | sudo gpg --dearmor -o /usr/share/keyrings/modular-stable-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/modular-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/modular/stable/deb/ubuntu jammy main" | sudo tee /etc/apt/sources.list.d/modular.list
          sudo apt-get update
          sudo apt-get install -y modular
          
          echo "Authenticating Modular CLI..."
          modular auth ${{ secrets.MODULAR_AUTH_TOKEN }}
          
          echo "Installing Mojo..."
          modular install mojo
          
          MODULAR_HOME=$HOME/.modular
          echo "MODULAR_HOME=$MODULAR_HOME" >> $GITHUB_ENV
          MOJO_BIN=$(modular config mojo.path 2>/dev/null || echo "$MODULAR_HOME/pkg/packages.modular.com_mojo/bin")
          echo "$MOJO_BIN" >> $GITHUB_PATH
      - name: Static Analysis
        run: mojo check src/main.mojo
